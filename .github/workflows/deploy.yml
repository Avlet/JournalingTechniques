name: Deploy Astro to Hostinger

on:
  push:
    branches:
      - main
  # Agar hum event name nahi bhej rahe hain, toh GitHub har ek webhook signal par run karega
  repository_dispatch:
    types: ["*"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          WORDPRESS_API_URL: https://cms.journalingtechniques.org/graphql
          SITE_URL: https://journalingtechniques.org

      - name: Sync Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: false
          # Timeout se bachne ke liye thoda extra time de rahe hain
          timeout: 60000